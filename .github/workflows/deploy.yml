# 🚀 Deploy automático para GitHub Pages
# Roda toda vez que você fizer push na branch master

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

# Permissões necessárias para publicar no Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultâneos
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1️⃣ Baixa o código do repositório
      - uses: actions/checkout@v4

      # 2️⃣ Configura o GitHub Pages
      - uses: actions/configure-pages@v5

      # 3️⃣ Empacota todos os arquivos do projeto
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # 4️⃣ Publica no GitHub Pages e retorna a URL
      - uses: actions/deploy-pages@v4
        id: deployment
